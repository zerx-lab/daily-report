{{define "daily_report.html"}}
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{.Date}} {{.Weekday}} 工作日报</title>
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f0f1f4;
            font-family:
                &quot;Segoe UI&quot;, &quot;Microsoft YaHei&quot;,
                &quot;PingFang SC&quot;, &quot;Hiragino Sans GB&quot;, Arial,
                sans-serif;
            -webkit-font-smoothing: antialiased;
        "
    >
        <!-- 最外层容器 -->
        <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="100%"
            style="background-color: #f0f1f4"
        >
            <tr>
                <td align="center" style="padding: 32px 12px">
                    <!-- 邮件主体卡片 -->
                    <table
                        role="presentation"
                        cellpadding="0"
                        cellspacing="0"
                        border="0"
                        width="640"
                        style="
                            max-width: 640px;
                            width: 100%;
                            border-radius: 10px;
                            overflow: hidden;
                            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
                        "
                    >
                        <!-- ============ 头部纯色区域 ============ -->
                        <tr>
                            <td style="background-color: #1a1a2e; padding: 0">
                                <!--[if gte mso 9]>
              <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:640px;height:150px;">
                <v:fill type="tile" color="#1a1a2e" />
                <v:textbox inset="0,0,0,0">
              <![endif]-->
                                <table
                                    role="presentation"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    width="100%"
                                >
                                    <tr>
                                        <td
                                            style="padding: 36px 40px 30px 40px"
                                        >
                                            <!-- 应用标签 -->
                                            <table
                                                role="presentation"
                                                cellpadding="0"
                                                cellspacing="0"
                                                border="0"
                                            >
                                                <tr>
                                                    <td
                                                        style="
                                                            padding-bottom: 14px;
                                                        "
                                                    >
                                                        <span
                                                            style="
                                                                display: inline-block;
                                                                background-color: rgba(
                                                                    255,
                                                                    255,
                                                                    255,
                                                                    0.12
                                                                );
                                                                color: rgba(
                                                                    255,
                                                                    255,
                                                                    255,
                                                                    0.8
                                                                );
                                                                font-size: 11px;
                                                                font-weight: 600;
                                                                letter-spacing: 1.5px;
                                                                padding: 4px
                                                                    12px;
                                                                border-radius: 4px;
                                                                text-transform: uppercase;
                                                            "
                                                            >{{.AppName}}</span
                                                        >
                                                    </td>
                                                </tr>
                                            </table>
                                            <!-- 标题 -->
                                            <h1
                                                style="
                                                    margin: 0 0 10px 0;
                                                    color: #ffffff;
                                                    font-size: 26px;
                                                    font-weight: 700;
                                                    line-height: 1.3;
                                                    letter-spacing: 0.3px;
                                                "
                                            >
                                                工作日报
                                            </h1>
                                            <!-- 日期信息 -->
                                            <p
                                                style="
                                                    margin: 0;
                                                    color: rgba(
                                                        255,
                                                        255,
                                                        255,
                                                        0.7
                                                    );
                                                    font-size: 15px;
                                                    line-height: 1.5;
                                                "
                                            >
                                                <span
                                                    style="
                                                        display: inline-block;
                                                        margin-right: 4px;
                                                    "
                                                    >&#128197;</span
                                                >{{.Date}}&nbsp;&nbsp;{{.Weekday}}
                                            </p>
                                        </td>
                                    </tr>
                                </table>
                                <!--[if gte mso 9]>
                </v:textbox>
              </v:rect>
              <![endif]-->
                            </td>
                        </tr>

                        <!-- ============ 作者信息条 ============ -->
                        <tr>
                            <td style="background-color: #ffffff; padding: 0">
                                <table
                                    role="presentation"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    width="100%"
                                >
                                    <tr>
                                        <td
                                            style="
                                                padding: 20px 40px;
                                                border-bottom: 1px solid #ecedf1;
                                            "
                                        >
                                            <table
                                                role="presentation"
                                                cellpadding="0"
                                                cellspacing="0"
                                                border="0"
                                            >
                                                <tr>
                                                    <!-- 头像圆圈 -->
                                                    <td
                                                        style="
                                                            vertical-align: middle;
                                                            padding-right: 14px;
                                                        "
                                                    >
                                                        <div
                                                            style="
                                                                width: 40px;
                                                                height: 40px;
                                                                border-radius: 50%;
                                                                background-color: #1a1a2e;
                                                                text-align: center;
                                                                line-height: 40px;
                                                                color: #ffffff;
                                                                font-size: 16px;
                                                                font-weight: 700;
                                                            "
                                                        >
                                                            {{if
                                                            .Author}}{{slice
                                                            .Author 0
                                                            1}}{{else}}U{{end}}
                                                        </div>
                                                    </td>
                                                    <td
                                                        style="
                                                            vertical-align: middle;
                                                        "
                                                    >
                                                        <p
                                                            style="
                                                                margin: 0;
                                                                font-size: 15px;
                                                                font-weight: 600;
                                                                color: #1a1a2e;
                                                                line-height: 1.4;
                                                            "
                                                        >
                                                            {{.Author}}
                                                        </p>
                                                        <p
                                                            style="
                                                                margin: 2px 0 0
                                                                    0;
                                                                font-size: 12px;
                                                                color: #9ca3af;
                                                                line-height: 1.4;
                                                            "
                                                        >
                                                            提交于 {{.SentAt}}
                                                        </p>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <!-- ============ 正文内容区域 ============ -->
                        <tr>
                            <td style="background-color: #ffffff; padding: 0">
                                <table
                                    role="presentation"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    width="100%"
                                >
                                    <tr>
                                        <td
                                            style="padding: 28px 40px 36px 40px"
                                        >
                                            <!-- 小标题 -->
                                            <table
                                                role="presentation"
                                                cellpadding="0"
                                                cellspacing="0"
                                                border="0"
                                                style="margin-bottom: 18px"
                                            >
                                                <tr>
                                                    <td
                                                        style="
                                                            border-left: 4px
                                                                solid #4361ee;
                                                            padding-left: 12px;
                                                        "
                                                    >
                                                        <h2
                                                            style="
                                                                margin: 0;
                                                                font-size: 16px;
                                                                font-weight: 700;
                                                                color: #1a1a2e;
                                                                letter-spacing: 0.3px;
                                                            "
                                                        >
                                                            今日工作内容
                                                        </h2>
                                                    </td>
                                                </tr>
                                            </table>
                                            <!-- 正文 -->
                                            <table
                                                role="presentation"
                                                cellpadding="0"
                                                cellspacing="0"
                                                border="0"
                                                width="100%"
                                            >
                                                <tr>
                                                    <td
                                                        style="
                                                            background-color: #f8f9fb;
                                                            border-radius: 8px;
                                                            padding: 24px 28px;
                                                            border: 1px solid
                                                                #ecedf1;
                                                        "
                                                    >
                                                        <div
                                                            style="
                                                                font-size: 14px;
                                                                line-height: 1.8;
                                                                color: #374151;
                                                                word-break: break-word;
                                                                white-space: pre-wrap;
                                                            "
                                                        >
                                                            {{.Content}}
                                                        </div>
                                                    </td>
                                                </tr>
                                            </table>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <!-- ============ 分隔线 ============ -->
                        <tr>
                            <td
                                style="
                                    background-color: #ffffff;
                                    padding: 0 40px;
                                "
                            >
                                <table
                                    role="presentation"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    width="100%"
                                >
                                    <tr>
                                        <td
                                            style="
                                                border-top: 1px solid #ecedf1;
                                                font-size: 0;
                                                line-height: 0;
                                                height: 1px;
                                            "
                                        >
                                            &nbsp;
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>

                        <!-- ============ 底部灰色信息栏 ============ -->
                        <tr>
                            <td
                                style="
                                    background-color: #f8f9fb;
                                    padding: 0;
                                    border-radius: 0 0 10px 10px;
                                "
                            >
                                <table
                                    role="presentation"
                                    cellpadding="0"
                                    cellspacing="0"
                                    border="0"
                                    width="100%"
                                >
                                    <tr>
                                        <td
                                            style="
                                                padding: 24px 40px 28px 40px;
                                                text-align: center;
                                            "
                                        >
                                            <p
                                                style="
                                                    margin: 0 0 6px 0;
                                                    font-size: 12px;
                                                    color: #9ca3af;
                                                    line-height: 1.6;
                                                "
                                            >
                                                此邮件由
                                                <strong style="color: #6b7280"
                                                    >{{.AppName}}</strong
                                                >
                                                自动发送，请勿直接回复
                                            </p>
                                            <p
                                                style="
                                                    margin: 0 0 4px 0;
                                                    font-size: 12px;
                                                    color: #9ca3af;
                                                    line-height: 1.6;
                                                "
                                            >
                                                发送时间：{{.SentAt}}
                                            </p>
                                            <p
                                                style="
                                                    margin: 12px 0 0 0;
                                                    font-size: 11px;
                                                    color: #d1d5db;
                                                    line-height: 1.5;
                                                "
                                            >
                                                &copy; {{.Year}} {{.AppName}}
                                            </p>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                    </table>
                    <!-- /邮件主体卡片 -->
                </td>
            </tr>
        </table>
        <!-- /最外层容器 -->
    </body>
</html>
{{end}}
